[package]
name = "minecraft_conduit"
version = "0.1.0"
edition = "2024"
authors = ["SirCesarium <contact.cesarmarcano@gmail.com>"]
description = "Minecraft Server Manager"
repository = "https://github.com/SirCesarium/minecraft-conduit"
homepage = "https://github.com/SirCesarium/minecraft-conduit"
license = "MIT"

[lib]
name = "conduit"

[[bin]]
name = "conduit"
required-features = ["cli"]

[features]
cli = []

[dependencies]
enderpearl = { version = "1.0.0", default-features = false }
minecraft_registry_api = { version = "1.0.1", default-features = false, features = ["mojang", "modrinth", "neoforge"] }
modcrawl = { version = "0.5.0", default-features = false }
zipcrawl = { version = "2.4.0", default-features = false, features = ["compress", "serde"] }

[package.metadata.deb]
maintainer = "SirCesarium"
section = "net"
priority = "optional"
assets = [
    ["target/release/conduit", "usr/bin/", "755"],
]

[package.metadata.generate-rpm]
assets = [
    { source = "target/release/conduit", dest = "/usr/bin/conduit", mode = "755" },
]
