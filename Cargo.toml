[package]
name = "minecraft_conduit"
version = "0.1.0"
edition = "2024"
authors = ["SirCesarium"]
description = "Minecraft Server Manager"
repository = "https://github.com/SirCesarium/conduit-cli"
homepage = "https://github.com/SirCesarium/conduit-cli"
license = "MIT"

[lib]
name = "conduit"

[[bin]]
name = "conduit"
required-features = ["cli"]

[features]
cli = []

[package.metadata.deb]
maintainer = "SirCesarium"
section = "net"
priority = "optional"
assets = [
    ["target/release/conduit", "usr/bin/", "755"],
]

[package.metadata.generate-rpm]
assets = [
    { source = "target/release/conduit", dest = "/usr/bin/conduit", mode = "755" },
]
