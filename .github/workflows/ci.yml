name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Lint
        run: cargo clippy --all-features --all-targets -- -D warnings
      - name: Check
        run: cargo check --all-features --all-targets
      - name: Test
        run: cargo test --all-features
